<!-- Баннер первый блок -->
<section
	class="pt-[20px] md:pt-[66px] lg:pt-[88px] relative w-full bg-cover bg-mobile-left-35"
	style="background-image: url(&quot;./images/desktop-banner-bg.webp&quot;)"
>
	<div class="container mx-auto flex flex-col items-center text-center pt-[160px] pb-[120px] md:pb-[214px]">
		<!-- H1 заголовок -->
		<h1 class="flex flex-col items-center leading-[1.2]">
			<!-- Первый ряд: Рыба 2026 -->
			<span class="mb-3 leading-[0.8] text-[50px] md:text-[75px] lg:text-[100px] font-bold font-transforma text-white uppercase">
				РЫБА-<span class="text-[#f4a77f]">2026</span>
			</span>

			<!-- Второй ряд: 11 международная конференция -->
			<span
				class="mb-5 xl:mb-2 leading-[1] text-[33px] md:text-[47px] lg:text-[60px] font-bold font-transforma text-white uppercase tracking-[-0.02em]"
			>
				XI международная конференция
			</span>

			<!-- Третий ряд: дата и город -->
			<span
				class="mb-10 xl:mb-0 gap-2 flex-col xl:flex-row flex justify-between w-full text-[22px] md:text-[28px] lg:text-[35px] md:font-medium font-transforma text-white uppercase"
			>
				<span>18•20 февраля</span>
				<span>Санкт-Петербург</span>
			</span>
		</h1>

		<!-- Подзаголовок -->
		<p class="leading-[1.2] w-[65%] lg:w-full text-[20px] lg:text-[23px] font-myriad text-white">11 лет объединяем лидеров отрасли</p>

		<!-- Кнопка -->
		<button
			data-modal="partner"
			class="open-modal-btn mt-[70px] lg:mt-[50px] w-full md:w-auto px-[50px] text-[18px] md:font-semibold md:text-[19px] h-[52px] md:h-[63px] rounded-[30px] text-white font-myriad flex items-center justify-center shrink-0 bg-gradient-to-r from-[#f4a77f] to-[#ee7c7f] transition-all duration-300 hover:brightness-105 active:scale-95"
		>
			Принять участие
		</button>
	</div>
</section>
